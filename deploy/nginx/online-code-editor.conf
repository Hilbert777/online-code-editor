server {
    # 不绑定域名时直接监听 80 端口，用户通过 http://服务器IP/ 访问。
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # dist 目录内容上传到该路径，Nginx 只负责托管静态文件。
    root /var/www/online-code-editor;
    index index.html;

    # 前端单页应用刷新时回退到 index.html，避免直接访问路径时 404。
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite 生成的 assets 文件名带 hash，可设置长缓存提升访问速度。
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 首页不能强缓存，否则重新部署后用户可能还看到旧入口文件。
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # 对 JS/CSS/JSON 等静态文本资源启用 gzip 压缩，减少传输体积。
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml;
}
